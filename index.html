<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haul — See it. Scan it. Shop it.</title>
    <meta name="description" content="Screenshot any outfit and instantly find where to buy every piece.">
    <meta name="theme-color" content="#FF6900">

    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">

    <meta property="og:type" content="website">
    <meta property="og:title" content="Haul — See it. Scan it. Shop it.">
    <meta property="og:description" content="Screenshot any outfit and instantly find where to buy every piece.">
    <meta property="og:image" content="https://haul-app.com/app-icon.png">
    <meta property="og:url" content="https://haul-app.com">
    <meta name="twitter:card" content="summary_large_image">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/wedges-2" rel="stylesheet">

    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #F6F4F1;
            --black: #1A1A1A;
            --text-secondary: #7A7A7A;
            --accent: #FF6900;
            --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        html { -webkit-font-smoothing: antialiased; }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--black);
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        a { text-decoration: none; color: inherit; }

        /* ============================================
           LAYOUT — single screen, two columns
           ============================================ */
        .page {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: auto 1fr auto;
            grid-template-areas:
                "logo logo"
                "copy visual"
                "footer footer";
            min-height: 0;
        }

        /* ============================================
           LOGO
           ============================================ */
        .logo {
            grid-area: logo;
            padding: 32px 48px 0;
            font-family: 'Wedges', sans-serif;
            font-size: 28px;
            color: var(--accent);
        }

        /* ============================================
           LEFT — copy + CTA
           ============================================ */
        .copy {
            grid-area: copy;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 48px;
        }

        .copy h1 {
            font-size: clamp(36px, 4.5vw, 56px);
            font-weight: 800;
            line-height: 1.08;
            letter-spacing: -1.5px;
            margin-bottom: 20px;
            color: var(--black);
        }

        .copy .sub {
            font-size: 17px;
            color: var(--text-secondary);
            line-height: 1.5;
            max-width: 380px;
            margin-bottom: 32px;
        }

        /* Waitlist form */
        .waitlist-form {
            display: flex;
            gap: 10px;
            max-width: 400px;
        }

        .waitlist-form input[type="email"] {
            flex: 1;
            padding: 14px 16px;
            border: 1.5px solid rgba(0,0,0,0.12);
            border-radius: 12px;
            font-size: 15px;
            font-family: var(--font);
            background: #fff;
            color: var(--black);
            outline: none;
            transition: border-color 0.2s;
        }

        .waitlist-form input[type="email"]:focus {
            border-color: var(--accent);
        }

        .waitlist-form input[type="email"]::placeholder {
            color: #aaa;
        }

        .waitlist-form button {
            padding: 14px 22px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            font-family: var(--font);
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s ease;
        }

        .waitlist-form button:hover {
            background: #E85E00;
        }

        .waitlist-form button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .waitlist-success {
            display: none;
            align-items: center;
            gap: 8px;
            font-size: 15px;
            font-weight: 600;
            color: var(--accent);
        }

        .waitlist-success.show { display: inline-flex; }

        .waitlist-error {
            display: none;
            font-size: 14px;
            color: #d32f2f;
            margin-top: 8px;
        }

        .waitlist-error.show { display: block; }

        .hint {
            margin-top: 14px;
            font-size: 13px;
            color: #aaa;
        }

        /* ============================================
           RIGHT — phone mockup
           ============================================ */
        .visual {
            grid-area: visual;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 48px 40px 0;
            min-height: 0;
        }

        .phone-frame {
            width: 280px;
            max-height: 80vh;
            aspect-ratio: 9 / 19.5;
            background: var(--black);
            border-radius: 36px;
            padding: 8px;
            box-shadow: 0 24px 48px rgba(0,0,0,0.10);
        }

        .phone-screen {
            width: 100%;
            height: 100%;
            border-radius: 29px;
            overflow: hidden;
        }

        .phone-screen img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* ============================================
           FOOTER
           ============================================ */
        .foot {
            grid-area: footer;
            padding: 20px 48px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 13px;
            color: #aaa;
        }

        .foot-links {
            display: flex;
            gap: 20px;
        }

        .foot-links a {
            color: #aaa;
            transition: color 0.2s;
        }

        .foot-links a:hover { color: var(--black); }

        /* ============================================
           MOBILE
           ============================================ */
        @media (max-width: 768px) {
            body { overflow: auto; height: auto; }

            .page {
                grid-template-columns: 1fr;
                grid-template-areas:
                    "logo"
                    "copy"
                    "visual"
                    "footer";
                grid-template-rows: auto auto auto auto;
            }

            .logo { padding: 24px 24px 0; }

            .copy {
                padding: 40px 24px;
                justify-content: flex-start;
            }

            .copy h1 { font-size: 36px; letter-spacing: -1px; }

            .waitlist-form {
                flex-wrap: wrap;
                max-width: 100%;
            }

            .waitlist-form input[type="email"] { min-width: 0; }

            .visual {
                padding: 0 24px 40px;
                justify-content: center;
            }

            .phone-frame {
                width: 220px;
                max-height: none;
            }

            .foot {
                padding: 20px 24px;
                flex-direction: column;
                gap: 12px;
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <div class="page">
        <div class="logo">Haul</div>

        <div class="copy">
            <h1>See it. Scan it.<br>Shop it.</h1>
            <p class="sub">Screenshot any outfit and instantly find where to buy every piece. From the jacket to the shoes.</p>

            <form class="waitlist-form" id="hero-waitlist" onsubmit="return handleWaitlist(event, this)">
                <input type="email" placeholder="Your email" required autocomplete="email">
                <button type="submit">Get Early Access</button>
            </form>
            <div class="waitlist-success" id="hero-success">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
                You're in! We'll email you at launch.
            </div>
            <div class="waitlist-error" id="hero-error"></div>
            <p class="hint">Coming soon to iOS. Free to use.</p>
        </div>

        <div class="visual">
            <div class="phone-frame">
                <div class="phone-screen">
                    <img src="app-screenshot.png" alt="Haul app screenshot">
                </div>
            </div>
        </div>

        <div class="foot">
            <span>&copy; 2026 Haul</span>
            <div class="foot-links">
                <a href="/privacy">Privacy</a>
                <a href="/terms">Terms</a>
                <a href="/support">Support</a>
                <a href="mailto:haulapp.com@gmail.com">Contact</a>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://wmhxzklzbzdlwcgejema.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndtaHh6a2x6YnpkbHdjZ2VqZW1hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MDk2NjUsImV4cCI6MjA4ODk4NTY2NX0.LnBw4_zbyjTSLY4eiJnEs41WKH1lPlfBI8kGR7aZMM4';

        async function handleWaitlist(e, form) {
            e.preventDefault();
            const email = form.querySelector('input[type="email"]').value.trim();
            const btn = form.querySelector('button');
            const successEl = document.getElementById('hero-success');
            const errorEl = document.getElementById('hero-error');

            btn.disabled = true;
            btn.textContent = 'Joining...';
            errorEl.classList.remove('show');

            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/waitlist`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                        'Prefer': 'return=minimal'
                    },
                    body: JSON.stringify({ email })
                });

                if (res.ok || res.status === 409) {
                    form.style.display = 'none';
                    successEl.classList.add('show');
                } else {
                    throw new Error('fail');
                }
            } catch (err) {
                errorEl.textContent = 'Something went wrong. Please try again.';
                errorEl.classList.add('show');
                btn.disabled = false;
                btn.textContent = 'Get Early Access';
            }
            return false;
        }
    </script>

</body>
</html>
