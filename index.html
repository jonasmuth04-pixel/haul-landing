<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haul — See it. Share it. Shop it.</title>
    <meta name="description" content="Spot an outfit on Instagram or TikTok? Screenshot it, share it to Haul, and we'll instantly find every piece.">
    <meta name="theme-color" content="#FF6900">

    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">

    <meta property="og:type" content="website">
    <meta property="og:title" content="Haul — See it. Share it. Shop it.">
    <meta property="og:description" content="Spot an outfit on Instagram or TikTok? Screenshot it, share it to Haul, and we'll instantly find every piece.">
    <meta property="og:image" content="https://haul-app.com/app-icon.png">
    <meta property="og:url" content="https://haul-app.com">
    <meta name="twitter:card" content="summary_large_image">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/wedges-2" rel="stylesheet">

    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #F6F4F1;
            --black: #1A1A1A;
            --text-secondary: #7A7A7A;
            --accent: #FF6900;
            --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        html { -webkit-font-smoothing: antialiased; }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--black);
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        a { text-decoration: none; color: inherit; }

        /* ============================================
           LAYOUT — single screen, two columns
           ============================================ */
        .page {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: auto 1fr auto;
            grid-template-areas:
                "logo logo"
                "copy visual"
                "footer footer";
            min-height: 0;
        }

        /* ============================================
           LOGO
           ============================================ */
        .logo {
            grid-area: logo;
            padding: 32px 48px 0;
            font-family: 'Wedges', sans-serif;
            font-size: 34px;
            color: var(--accent);
        }

        /* ============================================
           LEFT — copy + CTA
           ============================================ */
        .copy {
            grid-area: copy;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 48px;
        }

        .copy h1 {
            font-size: clamp(36px, 4.5vw, 56px);
            font-weight: 800;
            line-height: 1.08;
            letter-spacing: -1.5px;
            margin-bottom: 20px;
            color: var(--black);
        }

        .copy .sub {
            font-size: 17px;
            color: var(--text-secondary);
            line-height: 1.5;
            max-width: 380px;
            margin-bottom: 32px;
        }

        /* Waitlist form */
        .waitlist-form {
            display: flex;
            gap: 10px;
            max-width: 400px;
        }

        .waitlist-form input[type="email"] {
            flex: 1;
            padding: 14px 16px;
            border: 1.5px solid rgba(0,0,0,0.12);
            border-radius: 12px;
            font-size: 15px;
            font-family: var(--font);
            background: #fff;
            color: var(--black);
            outline: none;
            transition: border-color 0.2s;
        }

        .waitlist-form input[type="email"]:focus {
            border-color: var(--accent);
        }

        .waitlist-form input[type="email"]::placeholder {
            color: #aaa;
        }

        .waitlist-form button {
            padding: 14px 22px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            font-family: var(--font);
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s ease;
        }

        .waitlist-form button:hover {
            background: #E85E00;
        }

        .waitlist-form button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .waitlist-success {
            display: none;
            align-items: center;
            gap: 8px;
            font-size: 15px;
            font-weight: 600;
            color: var(--accent);
        }

        .waitlist-success.show { display: inline-flex; }

        .waitlist-error {
            display: none;
            font-size: 14px;
            color: #d32f2f;
            margin-top: 8px;
        }

        .waitlist-error.show { display: block; }

        .social-proof {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
        }

        .avatars {
            display: flex;
        }

        .avatars .av {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2px solid var(--bg);
            margin-right: -8px;
            background: #ddd;
            overflow: hidden;
        }

        .avatars .av img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .social-proof span {
            font-size: 13px;
            color: #999;
        }

        .social-proof strong {
            color: var(--black);
            font-weight: 700;
        }

        .hint {
            margin-top: 10px;
            font-size: 13px;
            color: #aaa;
        }

        /* ============================================
           RIGHT — phone mockup + floating cards
           ============================================ */
        .visual {
            grid-area: visual;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 48px 40px 0;
            min-height: 0;
            position: relative;
            overflow: hidden;
        }

        /* Floating product cards across the whole page */
        .float-card {
            position: fixed;
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            padding: 8px;
            opacity: 0.4;
            pointer-events: none;
            z-index: 0;
        }

        .float-card .fc-img {
            width: 100%;
            aspect-ratio: 3/4;
            background: #ECEAE7;
            border-radius: 8px;
            margin-bottom: 8px;
            overflow: hidden;
        }

        .float-card .fc-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .float-card .fc-name {
            font-size: 11px;
            font-weight: 600;
            color: #1A1A1A;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .float-card .fc-price {
            font-size: 12px;
            font-weight: 700;
            color: var(--accent);
            margin-top: 2px;
        }

        /* Distributed across all free space — never over text, form, or phone */
        .fc-1 { width: 95px;  top: 3%;  right: 44%; transform: rotate(-3deg); }           /* top center gap */
        .fc-2 { width: 90px;  top: 3%;  left: 32%;  transform: rotate(3deg); opacity: 0.35; }  /* Dress: top-left area */
        .fc-3 { width: 95px;  bottom: 4%; left: 34%; transform: rotate(2deg); opacity: 0.38; } /* Crop Top: next to Blazer */
        .fc-4 { width: 90px;  bottom: 4%; left: 22%; transform: rotate(-2deg); opacity: 0.32; }/* bottom-left, next to fc-3 */
        .fc-5 { width: 95px;  top: 2%;  right: 2%;  transform: rotate(4deg); opacity: 0.38; } /* top-right corner */
        .fc-6 { width: 90px;  top: 50%; right: 1%;  transform: rotate(-3deg); opacity: 0.35; }/* right edge, mid */
        .fc-7 { width: 95px;  bottom: 4%; right: 2%; transform: rotate(3deg); opacity: 0.35; }/* bottom-right corner */

        .phone-mockup {
            position: relative;
            z-index: 1;
            max-height: 80vh;
            width: auto;
            height: auto;
            max-width: 320px;
            filter: drop-shadow(0 20px 40px rgba(0,0,0,0.10));
        }

        /* ============================================
           FOOTER
           ============================================ */
        .foot {
            grid-area: footer;
            padding: 20px 48px;
            display: flex;
            align-items: center;
            gap: 24px;
            font-size: 13px;
            color: #aaa;
        }

        .foot-links {
            display: flex;
            gap: 20px;
        }

        .foot-links a {
            color: #aaa;
            transition: color 0.2s;
        }

        .foot-links a:hover { color: var(--black); }

        /* ============================================
           MOBILE
           ============================================ */
        @media (max-width: 768px) {
            body { overflow: auto; height: auto; }

            .page {
                grid-template-columns: 1fr;
                grid-template-areas:
                    "logo"
                    "copy"
                    "visual"
                    "footer";
                grid-template-rows: auto auto auto auto;
            }

            .logo { padding: 24px 24px 0; text-align: center; }

            .copy {
                padding: 40px 24px;
                justify-content: flex-start;
                align-items: center;
                text-align: center;
            }

            .copy h1 { font-size: 36px; letter-spacing: -1px; }

            .copy .sub { margin-left: auto; margin-right: auto; }

            .hint { text-align: center; }

            .waitlist-form {
                flex-direction: column;
                max-width: 280px;
                align-items: center;
            }

            .waitlist-form input[type="email"] {
                width: 100%;
                min-width: 0;
            }

            .waitlist-form button {
                width: 100%;
            }

            .float-card { display: none; }

            .visual {
                padding: 0 24px 40px;
                justify-content: center;
            }

            .phone-mockup {
                max-width: 220px;
                max-height: none;
            }

            .foot {
                padding: 20px 24px;
                flex-direction: column;
                gap: 12px;
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <div class="page">
        <div class="logo">Haul</div>

        <div class="copy">
            <h1>See it. Share it.<br>Shop it.</h1>
            <p class="sub">Spot an outfit on Instagram or TikTok? Screenshot it, share it to Haul, and we'll instantly find every piece — from the jacket to the shoes.</p>

            <form class="waitlist-form" id="hero-waitlist" onsubmit="return handleWaitlist(event, this)">
                <input type="email" placeholder="Your email" required autocomplete="email">
                <button type="submit">Get Early Access</button>
            </form>
            <div class="waitlist-success" id="hero-success">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
                You're in! We'll email you at launch.
            </div>
            <div class="waitlist-error" id="hero-error"></div>
            <div class="social-proof">
                <div class="avatars">
                    <div class="av"><img src="https://i.pravatar.cc/56?img=1" alt=""></div>
                    <div class="av"><img src="https://i.pravatar.cc/56?img=5" alt=""></div>
                    <div class="av"><img src="https://i.pravatar.cc/56?img=9" alt=""></div>
                    <div class="av"><img src="https://i.pravatar.cc/56?img=16" alt=""></div>
                </div>
                <span><strong>550+</strong> people on the waitlist</span>
            </div>
            <p class="hint">Coming soon to iOS. Free to use.</p>
        </div>

        <div class="visual">
            <img class="phone-mockup" src="phone-mockup.png" alt="Haul app — outfit scan with bounding boxes and product results">
        </div>

        <div class="foot">
            <div style="display:flex;align-items:center;gap:16px;">
                <a href="https://www.tiktok.com/@haul.ai" target="_blank" rel="noopener" style="color:var(--black);display:flex;opacity:0.7;" aria-label="TikTok">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1v-3.5a6.37 6.37 0 00-.79-.05A6.34 6.34 0 003.15 15.2a6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.34-6.34V8.73a8.19 8.19 0 004.76 1.52v-3.4a4.85 4.85 0 01-1-.16z"/></svg>
                </a>
                <a href="mailto:haulapp.com@gmail.com" style="color:var(--black);display:flex;opacity:0.7;" aria-label="Contact">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                </a>
            </div>
            <div class="foot-links">
                <a href="/terms">Terms</a> & <a href="/privacy">Privacy</a>
                <span style="color:#ccc;">·</span>
                <a href="/faq">FAQ</a>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://wmhxzklzbzdlwcgejema.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndtaHh6a2x6YnpkbHdjZ2VqZW1hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MDk2NjUsImV4cCI6MjA4ODk4NTY2NX0.LnBw4_zbyjTSLY4eiJnEs41WKH1lPlfBI8kGR7aZMM4';

        async function handleWaitlist(e, form) {
            e.preventDefault();
            const email = form.querySelector('input[type="email"]').value.trim();
            const btn = form.querySelector('button');
            const successEl = document.getElementById('hero-success');
            const errorEl = document.getElementById('hero-error');

            btn.disabled = true;
            btn.textContent = 'Joining...';
            errorEl.classList.remove('show');

            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/waitlist`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                        'Prefer': 'return=minimal'
                    },
                    body: JSON.stringify({ email })
                });

                if (res.ok || res.status === 409) {
                    form.style.display = 'none';
                    successEl.classList.add('show');
                } else {
                    throw new Error('fail');
                }
            } catch (err) {
                errorEl.textContent = 'Something went wrong. Please try again.';
                errorEl.classList.add('show');
                btn.disabled = false;
                btn.textContent = 'Get Early Access';
            }
            return false;
        }
    </script>

</body>
</html>
